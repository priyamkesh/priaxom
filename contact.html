<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriAxom AI Projects | Contact Developer</title>

    <style>
        :root {
            --bg-color: #050b14;
            --text-main: #e2e8f0;
            --text-muted: #94a3b8;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --gradient-start: #00f2fe;
            --gradient-end: #4facfe;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-image: radial-gradient(circle at top left, rgba(0, 242, 254, 0.05), transparent 40%),
                              radial-gradient(circle at bottom right, rgba(79, 172, 254, 0.05), transparent 40%);
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 2rem 5%;
        }

        .brand {
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .brand span {
            color: var(--gradient-start);
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 5% 4rem 5%;
        }

        h1 {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 800;
            letter-spacing: -0.02em;
            margin-bottom: 3rem;
            text-align: center;
        }

        .gradient-text {
            background: linear-gradient(90deg, var(--gradient-start) 0%, #8360c3 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        /* Centered Contact Card */
        .contact-card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 16px;
            padding: 3rem 2rem;
            text-align: center;
            max-width: 500px;
            width: 100%;
        }

        .card-title {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            color: #ffffff;
        }

        .card-subtitle {
            font-size: 1.1rem;
            color: var(--text-muted);
            margin-bottom: 2.5rem;
        }

        /* Mailto Button */
        .email-btn {
            display: inline-block;
            background: linear-gradient(90deg, var(--gradient-start), var(--gradient-end));
            color: #ffffff;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 2.5rem;
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .email-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 242, 254, 0.4);
        }
    </style>
</head>
<body>

    <header>
        <div class="brand">PriAxom AI Projects<span>.</span></div>
    </header>

    <main>
        <h1>Contact <span class="gradient-text">Developer.</span></h1>
        
        <div class="contact-card">
            <h2 class="card-title">Architecture of PriAxom AI Projects.</h2>
            <p class="card-subtitle">Priyam Kesh.</p>
            
            <a href="mailto:priaxom.ai@outlook.com" class="email-btn">Send Email</a>
        </div>
    </main>

</body>
</html>
